name: family_recipe_app
description: "家的味道 - 家庭菜谱管理应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI组件
  cupertino_icons: ^1.0.6

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # 图片处理
  image_picker: ^1.0.4

  # 日期处理
  intl: ^0.18.1

  # 工具类
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/